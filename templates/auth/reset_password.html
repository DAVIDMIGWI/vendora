{% extends "base.html" %}

{% block title %}Reset Password - Vendora{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Reset your password</h1>
            <p class="text-gray-600 mb-6">Choose a new password for your account.</p>

            <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                <div class="mb-4">
                    <label for="password" class="block text-gray-700 text-sm font-medium mb-2">New password</label>
                    <input type="password" id="password" name="password" required placeholder="At least 8 characters"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>

                <div class="mb-6">
                    <label for="confirm_password" class="block text-gray-700 text-sm font-medium mb-2">Confirm new
                        password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                        placeholder="Repeat your new password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                    Reset password
                </button>
            </form>

            <div class="mt-6 text-sm text-gray-600">
                <a href="{{ url_for('login') }}" class="text-primary hover:text-primary-dark font-medium">Back to
                    login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
