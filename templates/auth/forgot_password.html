{% extends "base.html" %}

{% block title %}Forgot Password - Vendora{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Forgot your password?</h1>
            <p class="text-gray-600 mb-6">
                Enter your email and we’ll send you a reset link. The link expires in <span class="font-semibold">10
                    minutes</span>.
            </p>

            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                    Send reset link
                </button>
            </form>

            <div class="mt-6 text-sm text-gray-600">
                <a href="{{ url_for('login') }}" class="text-primary hover:text-primary-dark font-medium">Back to
                    login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
