{% extends "base.html" %}

{% block title %}{% if category %}Edit Category{% else %}New Category{% endif %} - Vendora{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">
        {% if category %}Edit Category{% else %}New Category{% endif %}
    </h1>
    
    <form method="POST" action="{% if category %}{{ url_for('admin.edit_category', category_id=category.id) }}{% else %}{{ url_for('admin.new_category') }}{% endif %}" 
          class="bg-white rounded-lg shadow-md p-6">
        <div class="mb-4">
            <label for="name" class="block text-gray-700 text-sm font-medium mb-2">Category Name *</label>
            <input type="text" id="name" name="name" value="{% if category %}{{ category.name }}{% endif %}" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
        </div>
        
        <div class="mb-4">
            <label for="slug" class="block text-gray-700 text-sm font-medium mb-2">Slug (auto-generated if empty)</label>
            <input type="text" id="slug" name="slug" value="{% if category %}{{ category.slug }}{% endif %}"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
        </div>
        
        <div class="flex gap-2">
            <button type="submit" 
                    class="flex-1 bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                {% if category %}Update{% else %}Create{% endif %}
            </button>
            <a href="{{ url_for('admin.categories') }}" 
               class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-4 rounded-lg text-center">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
